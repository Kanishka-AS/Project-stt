services:
  - type: web
    name: stt-js-server
    runtime: python
    rootDir: server
    buildCommand: pip install --no-cache-dir "pipecat-ai[daily,deepgram,runner,webrtc]"
    startCommand: python bot.py --host 0.0.0.0 --port 10000
    envVars:
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: DEEPGRAM_API_KEY
        sync: false
